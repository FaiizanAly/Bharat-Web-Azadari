<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login | BWA Admin</title>
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="../css/mobile.css">
</head>
<body class="admin-body admin-login-body">

  <!-- Decorative background -->
  <div class="login-bg-decoration" aria-hidden="true">
    <div class="login-bg-circle login-bg-circle-1"></div>
    <div class="login-bg-circle login-bg-circle-2"></div>
  </div>

  <div class="admin-login">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="login-logo-wrapper">
          <img src="../assets/logo.png" alt="Bharat Web Azadari Logo" width="80" height="80" onerror="this.style.display='none'">
        </div>
        <h1>Bharat Web Azadari</h1>
        <p>Admin Panel — Secure Access</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="password">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Password
          </label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="Enter admin password"
              required
              autocomplete="current-password"
              aria-describedby="login-error"
            >
            <button
              type="button"
              class="password-toggle"
              id="password-toggle"
              aria-label="Toggle password visibility"
              title="Show/hide password"
            >
              <!-- Eye icon (show) -->
              <svg id="eye-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (hide) — hidden by default -->
              <svg id="eye-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="login-error" role="alert" aria-live="polite"></span>
        </div>

        <button type="submit" id="login-btn" class="btn-primary w-full">
          <span id="login-btn-text">Login</span>
          <svg id="login-spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true" style="display:none; animation: spin 0.8s linear infinite;">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </button>
      </form>

      <p class="login-footer">
        <a href="../index.html">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          Back to Website
        </a>
      </p>

    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script>
    // ── Redirect if already logged in ──────────────────────────────────────
    if (sessionStorage.getItem(CONFIG.ADMIN_SESSION_KEY)) {
      window.location.href = 'dashboard.html';
    }

    // ── Password Visibility Toggle ─────────────────────────────────────────
    const passwordToggle = document.getElementById('password-toggle');
    const passwordInput  = document.getElementById('password');
    const eyeShow        = document.getElementById('eye-show');
    const eyeHide        = document.getElementById('eye-hide');

    passwordToggle.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeShow.style.display = isPassword ? 'none'  : 'block';
      eyeHide.style.display = isPassword ? 'block' : 'none';
      passwordToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });

    // ── Login Form Submission ──────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const password  = passwordInput.value.trim();
      const btn       = document.getElementById('login-btn');
      const btnText   = document.getElementById('login-btn-text');
      const spinner   = document.getElementById('login-spinner');
      const errorEl   = document.getElementById('login-error');

      // Clear previous error
      errorEl.textContent = '';
      passwordInput.classList.remove('input-error');

      if (!password) {
        errorEl.textContent = 'Please enter your password.';
        passwordInput.classList.add('input-error');
        passwordInput.focus();
        return;
      }

      // Loading state
      btn.disabled     = true;
      btnText.textContent = 'Verifying...';
      spinner.style.display = 'inline-block';

      try {
        await login(password);
        // login() in auth.js handles redirect on success
      } catch (err) {
        errorEl.textContent = err.message || 'Invalid password. Please try again.';
        passwordInput.classList.add('input-error');
        passwordInput.select();
      } finally {
        btn.disabled     = false;
        btnText.textContent = 'Login';
        spinner.style.display = 'none';
      }
    });

    // ── Clear error on typing ──────────────────────────────────────────────
    passwordInput.addEventListener('input', () => {
      document.getElementById('login-error').textContent = '';
      passwordInput.classList.remove('input-error');
    });
  </script>

</body>
</html>
